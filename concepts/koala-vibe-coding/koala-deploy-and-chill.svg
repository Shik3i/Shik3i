<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Koala Deploy and Chill</title>
  <desc id="desc">A polished animated koala reclines in a beanbag with a laptop while a build deploys and switches to chill mode.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111522"/>
      <stop offset="1" stop-color="#293451"/>
    </linearGradient>
    <linearGradient id="beanbag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7f6ca8"/>
      <stop offset="1" stop-color="#4c416d"/>
    </linearGradient>
    <linearGradient id="laptop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39455e"/>
      <stop offset="1" stop-color="#222a3c"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#05070c" flood-opacity=".45"/>
    </filter>
    <filter id="screen-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#78dce8" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect width="960" height="300" rx="22" fill="url(#bg)"/>
  <circle cx="891" cy="49" r="28" fill="#f7e5a3"/>
  <circle cx="904" cy="39" r="28" fill="#202a42"/>
  <g fill="#9ac8ff" opacity=".85">
    <circle cx="68" cy="48" r="1.4"/>
    <circle cx="142" cy="89" r="1"/>
    <circle cx="409" cy="38" r="1.2"/>
    <circle cx="824" cy="88" r="1.3"/>
    <circle cx="929" cy="113" r="1"/>
  </g>
  <path d="M0 259 C174 235 348 266 511 248 C684 230 815 255 960 241 V300 H0 Z" fill="#0b0f19"/>

  <!-- Status card is separate from the koala scene. -->
  <g id="status" filter="url(#shadow)">
    <rect x="586" y="37" width="316" height="145" rx="17" fill="#0b1019" stroke="#4e5b76" stroke-width="3"/>
    <circle cx="606" cy="58" r="4" fill="#ff6188"/>
    <circle cx="621" cy="58" r="4" fill="#ffd866"/>
    <circle cx="636" cy="58" r="4" fill="#a9dc76"/>
    <text x="606" y="87" fill="#727c99" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">koalastuff/night-shift</text>

    <text x="606" y="123" fill="#78dce8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700">
      building...
      <animate attributeName="opacity" values="1;1;0;0;0" keyTimes="0;.31;.37;.99;1" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="606" y="123" fill="#a9dc76" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700" opacity="0">
      deployed
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.36;.42;.62;.68;1" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="606" y="123" fill="#ffd866" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700" opacity="0">
      chill mode
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.67;.73;.95;1" dur="7s" repeatCount="indefinite"/>
    </text>
    <rect x="606" y="145" width="256" height="9" rx="4.5" fill="#252c3e"/>
    <rect x="606" y="145" width="0" height="9" rx="4.5" fill="#78dce8">
      <animate attributeName="width" values="0;256;256;0" keyTimes="0;.42;.9;1" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#78dce8;#78dce8;#a9dc76;#ffd866" keyTimes="0;.4;.69;1" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Beanbag supports the entire koala silhouette. -->
  <g id="beanbag" filter="url(#shadow)">
    <path d="M78 252 C80 174 116 103 198 86 C294 65 416 113 483 217 C501 245 480 269 448 271 H117 C94 271 77 266 78 252 Z" fill="url(#beanbag)" stroke="#3f355e" stroke-width="7"/>
    <path d="M112 243 C121 177 152 131 210 113 C287 90 382 129 441 222 C452 240 440 250 417 251 H137 C119 251 109 249 112 243 Z" fill="#8c79b4" opacity=".58"/>
    <path d="M113 254 C216 238 356 241 450 259" fill="none" stroke="#3f355e" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Koala reclines against the beanbag. -->
  <g id="koala">
    <path d="M222 171 C246 137 292 127 342 143 C390 158 423 194 431 238 C405 257 341 263 284 251 C231 240 203 206 222 171 Z" fill="#7b8894" stroke="#354151" stroke-width="7"/>
    <path d="M266 228 C236 242 207 249 182 245 C165 242 160 226 174 218 C194 207 220 204 250 205 Z" fill="#9eabb6" stroke="#354151" stroke-width="6"/>
    <path d="M372 226 C405 230 435 240 452 253 C463 262 454 277 439 276 C412 274 385 261 359 244 Z" fill="#9eabb6" stroke="#354151" stroke-width="6"/>

    <circle cx="195" cy="103" r="42" fill="#7e8b98" stroke="#354151" stroke-width="6"/>
    <circle cx="328" cy="103" r="42" fill="#7e8b98" stroke="#354151" stroke-width="6"/>
    <circle cx="195" cy="103" r="24" fill="#d69aa7"/>
    <circle cx="328" cy="103" r="24" fill="#d69aa7"/>
    <path d="M187 108 C187 54 218 30 262 30 C307 30 338 59 338 111 C338 165 307 190 262 190 C216 190 187 160 187 108 Z" fill="#aeb9c4" stroke="#354151" stroke-width="7"/>
    <path d="M224 110 Q235 101 246 110" fill="none" stroke="#232c37" stroke-width="6" stroke-linecap="round"/>
    <path d="M279 110 Q290 101 301 110" fill="none" stroke="#232c37" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="262" cy="136" rx="30" ry="24" fill="#eef2f6"/>
    <path d="M241 128 C241 113 250 105 262 105 C274 105 283 113 283 128 C283 141 273 148 262 148 C251 148 241 141 241 128 Z" fill="#232c37"/>
    <path d="M249 154 Q262 163 275 154" fill="none" stroke="#232c37" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="214" cy="84" rx="8" ry="15" fill="#ced6dd" opacity=".45" transform="rotate(28 214 84)"/>

    <!-- Arms terminate at the laptop base. -->
    <path d="M251 181 C281 188 320 195 364 204" fill="none" stroke="#aeb9c4" stroke-width="24" stroke-linecap="round"/>
    <path d="M362 173 C385 181 409 191 433 204" fill="none" stroke="#aeb9c4" stroke-width="24" stroke-linecap="round"/>
  </g>

  <!-- Laptop sits clearly on the lap, in front of the torso. -->
  <g id="laptop" filter="url(#screen-glow)">
    <path d="M352 117 L527 135 L501 207 L336 190 Z" fill="url(#laptop)" stroke="#141a27" stroke-width="6" stroke-linejoin="round"/>
    <path d="M366 132 L508 147 L491 191 L350 178 Z" fill="#0f2029"/>
    <g transform="translate(424 161) rotate(6)">
      <circle cx="0" cy="0" r="14" fill="none" stroke="#78dce8" stroke-width="4" stroke-dasharray="12 8">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="stroke" values="#78dce8;#78dce8;#a9dc76;#ffd866;#78dce8" keyTimes="0;.4;.58;.78;1" dur="7s" repeatCount="indefinite"/>
      </circle>
    </g>
    <path d="M336 190 L501 207 L550 235 L365 216 Z" fill="#424e67" stroke="#141a27" stroke-width="6" stroke-linejoin="round"/>
    <g fill="#78849c" transform="rotate(6 430 211)">
      <rect x="379" y="201" width="21" height="7" rx="2"/>
      <rect x="405" y="201" width="21" height="7" rx="2"/>
      <rect x="431" y="201" width="21" height="7" rx="2"/>
      <rect x="457" y="201" width="21" height="7" rx="2"/>
      <rect x="405" y="213" width="74" height="6" rx="3"/>
    </g>
  </g>

  <g id="paws">
    <ellipse cx="371" cy="200" rx="17" ry="13" fill="#929faa" stroke="#354151" stroke-width="4" transform="rotate(6 371 200)">
      <animateTransform attributeName="transform" additive="sum" type="translate" values="0 0;0 -3;0 0" dur=".72s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="444" cy="207" rx="17" ry="13" fill="#929faa" stroke="#354151" stroke-width="4" transform="rotate(6 444 207)">
      <animateTransform attributeName="transform" additive="sum" type="translate" values="0 -3;0 0;0 -3" dur=".72s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g id="side-table" filter="url(#shadow)">
    <ellipse cx="784" cy="243" rx="88" ry="17" fill="#493942"/>
    <rect x="774" y="243" width="20" height="42" fill="#30262d"/>
    <ellipse cx="784" cy="286" rx="48" ry="8" fill="#30262d"/>
    <rect x="744" y="202" width="48" height="38" rx="9" fill="#ff6188"/>
    <path d="M792 209 Q816 205 814 223 Q811 237 792 233" fill="none" stroke="#ff6188" stroke-width="9"/>
    <path d="M758 193 C748 180 770 174 759 159" fill="none" stroke="#c8d3f5" stroke-width="4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0 8;5 -3;0 -16" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.5;0" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
