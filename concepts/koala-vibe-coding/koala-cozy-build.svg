<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Koala Cozy Build</title>
  <desc id="desc">A polished animated koala sits behind a warm wooden desk while an idea moves through a tiny release pipeline.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ee"/>
      <stop offset="1" stop-color="#ead8c1"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b67856"/>
      <stop offset="1" stop-color="#845039"/>
    </linearGradient>
    <linearGradient id="warm-screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#f9efe2"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#6f4b39" flood-opacity=".2"/>
    </filter>
    <filter id="lamp-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="960" height="300" rx="22" fill="url(#bg)"/>
  <circle cx="876" cy="52" r="36" fill="#efb75e" opacity=".25" filter="url(#lamp-glow)"/>
  <path d="M0 246 C170 226 328 252 500 238 C668 224 818 248 960 232 V300 H0 Z" fill="#d9c2a6"/>

  <g id="plant" transform="translate(831 112)">
    <path d="M34 101 C31 62 19 35 7 10 M35 101 C42 57 57 33 73 10 M35 101 C35 61 37 31 39 0" fill="none" stroke="#56865b" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="8" cy="14" rx="17" ry="9" fill="#72aa74" transform="rotate(36 8 14)"/>
    <ellipse cx="70" cy="14" rx="17" ry="9" fill="#72aa74" transform="rotate(-36 70 14)"/>
    <ellipse cx="39" cy="7" rx="10" ry="18" fill="#83b984"/>
    <path d="M10 96 H65 L58 137 H18 Z" fill="#c97658" stroke="#8f4e3c" stroke-width="4"/>
  </g>

  <!-- Monitor and its stand remain behind the desk. -->
  <g id="monitor" filter="url(#shadow)">
    <rect x="87" y="38" width="390" height="184" rx="16" fill="#684f45" stroke="#4d3933" stroke-width="4"/>
    <rect x="101" y="52" width="362" height="156" rx="9" fill="url(#warm-screen)"/>
    <text x="124" y="83" fill="#86695a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">tiny-tool.pipeline</text>

    <text x="124" y="125" fill="#c66c51" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700">
      idea
      <animate attributeName="opacity" values="1;1;0;0;0" keyTimes="0;.19;.24;.99;1" dur="8s" repeatCount="indefinite"/>
    </text>
    <text x="124" y="125" fill="#8c6fb0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700" opacity="0">
      vibing...
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.23;.28;.45;.5;1" dur="8s" repeatCount="indefinite"/>
    </text>
    <text x="124" y="125" fill="#477f9e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700" opacity="0">
      vibe coded
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.49;.54;.7;.75;1" dur="8s" repeatCount="indefinite"/>
    </text>
    <text x="124" y="125" fill="#4f8a5b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700" opacity="0">
      released
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.74;.79;.95;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <g transform="translate(124 159)">
      <circle cx="0" cy="0" r="8" fill="#c66c51"/>
      <rect x="12" y="-4" width="54" height="8" rx="4" fill="#e2b8a4"/>
      <circle cx="88" cy="0" r="8" fill="#dbcfe4">
        <animate attributeName="fill" values="#dbcfe4;#8c6fb0;#8c6fb0" keyTimes="0;.27;1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <rect x="100" y="-4" width="54" height="8" rx="4" fill="#cdbed9"/>
      <circle cx="176" cy="0" r="8" fill="#cadce4">
        <animate attributeName="fill" values="#cadce4;#cadce4;#477f9e;#477f9e" keyTimes="0;.52;.56;1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <rect x="188" y="-4" width="54" height="8" rx="4" fill="#afd0dc"/>
      <circle cx="264" cy="0" r="8" fill="#cedece">
        <animate attributeName="fill" values="#cedece;#cedece;#4f8a5b;#4f8a5b" keyTimes="0;.77;.81;1" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>
    <path d="M282 222 V239 M233 239 H331" fill="none" stroke="#71564a" stroke-width="13" stroke-linecap="round"/>
  </g>

  <!-- Chair behind the koala. -->
  <g filter="url(#shadow)">
    <path d="M604 215 C597 147 616 88 682 72 C747 56 802 96 813 169 L806 235 Z" fill="#6b806e" stroke="#455b4a" stroke-width="6"/>
    <path d="M624 211 C623 151 641 111 688 95 C735 80 778 111 787 169 L782 225 Z" fill="#78937c"/>
    <path d="M708 229 V274 M675 277 H741" fill="none" stroke="#455b4a" stroke-width="12" stroke-linecap="round"/>
    <path d="M708 274 L657 294 M708 274 L759 294" fill="none" stroke="#455b4a" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- Koala body and arms remain behind the desk. -->
  <g id="koala">
    <path d="M637 181 C635 143 655 125 690 122 C738 119 780 144 786 200 L783 242 H631 Z" fill="#7c898d" stroke="#435054" stroke-width="6"/>
    <circle cx="630" cy="94" r="42" fill="#819095" stroke="#435054" stroke-width="6"/>
    <circle cx="765" cy="94" r="42" fill="#819095" stroke="#435054" stroke-width="6"/>
    <circle cx="630" cy="94" r="24" fill="#dda5ad"/>
    <circle cx="765" cy="94" r="24" fill="#dda5ad"/>
    <path d="M621 100 C621 46 653 22 697 22 C742 22 775 51 775 103 C775 157 742 183 697 183 C650 183 621 153 621 100 Z" fill="#b4bec1" stroke="#435054" stroke-width="7"/>
    <ellipse cx="669" cy="104" rx="7" ry="10" fill="#30383b">
      <animate attributeName="ry" values="10;10;1.5;10;10" keyTimes="0;.39;.42;.45;1" dur="5.7s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="726" cy="104" rx="7" ry="10" fill="#30383b">
      <animate attributeName="ry" values="10;10;1.5;10;10" keyTimes="0;.39;.42;.45;1" dur="5.7s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="697" cy="129" rx="30" ry="24" fill="#f5efe8"/>
    <path d="M676 121 C676 106 685 98 697 98 C709 98 718 106 718 121 C718 134 708 141 697 141 C686 141 676 134 676 121 Z" fill="#353d40"/>
    <path d="M684 147 Q697 156 710 147" fill="none" stroke="#353d40" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="648" cy="75" rx="8" ry="15" fill="#d6dddf" opacity=".5" transform="rotate(28 648 75)"/>

    <path d="M650 173 C625 187 591 199 555 211" fill="none" stroke="#b4bec1" stroke-width="24" stroke-linecap="round"/>
    <path d="M744 171 C717 184 682 198 646 211" fill="none" stroke="#b4bec1" stroke-width="24" stroke-linecap="round"/>
  </g>

  <!-- Desk masks the lower body. -->
  <g id="desk">
    <rect x="44" y="229" width="872" height="24" rx="10" fill="url(#desk)" stroke="#704432" stroke-width="4"/>
    <path d="M74 253 H886 L872 300 H88 Z" fill="#754532"/>
    <path d="M111 253 V300 M849 253 V300" stroke="#5e382b" stroke-width="18"/>
    <path d="M74 266 H886" stroke="#945c42" stroke-width="3" opacity=".6"/>
  </g>

  <g id="keyboard" filter="url(#shadow)">
    <path d="M486 199 H638 L665 229 H471 Z" fill="#6d5a51" stroke="#4d3f39" stroke-width="3"/>
    <g fill="#e1d4ca">
      <rect x="499" y="206" width="20" height="7" rx="2"/>
      <rect x="524" y="206" width="20" height="7" rx="2"/>
      <rect x="549" y="206" width="20" height="7" rx="2"/>
      <rect x="574" y="206" width="20" height="7" rx="2"/>
      <rect x="599" y="206" width="20" height="7" rx="2"/>
      <rect x="512" y="217" width="104" height="6" rx="3"/>
    </g>
  </g>

  <g id="paws">
    <ellipse cx="551" cy="208" rx="17" ry="13" fill="#98a4a7" stroke="#435054" stroke-width="4">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur=".56s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="642" cy="210" rx="17" ry="13" fill="#98a4a7" stroke="#435054" stroke-width="4">
      <animateTransform attributeName="transform" type="translate" values="0 -3;0 0;0 -3" dur=".56s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g id="tea" filter="url(#shadow)">
    <rect x="392" y="195" width="46" height="34" rx="8" fill="#6ea27a"/>
    <path d="M438 201 Q460 198 458 215 Q455 227 438 223" fill="none" stroke="#6ea27a" stroke-width="8"/>
    <path d="M405 187 C395 175 416 169 406 155" fill="none" stroke="#927767" stroke-width="4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0 7;5 -4;0 -15" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.5;0" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
