<svg xmlns="http://www.w3.org/2000/svg" width="840" height="240" viewBox="0 0 840 240" role="img" aria-labelledby="title desc">
  <title id="title">Koala Night Shift</title>
  <desc id="desc">An animated koala types at a glowing computer while a terminal cycles through vibe coding statuses.</desc>

  <defs>
    <linearGradient id="night-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#17233a"/>
    </linearGradient>
    <radialGradient id="night-glow">
      <stop offset="0" stop-color="#58a6ff" stop-opacity=".34"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="night-soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="840" height="240" rx="18" fill="url(#night-bg)"/>
  <circle cx="690" cy="45" r="23" fill="#dce8ff" opacity=".9"/>
  <circle cx="701" cy="37" r="23" fill="#17233a"/>
  <g fill="#8bbcff">
    <circle cx="72" cy="42" r="1.5"/>
    <circle cx="135" cy="71" r="1"/>
    <circle cx="228" cy="34" r="1.2"/>
    <circle cx="755" cy="86" r="1.2"/>
    <circle cx="790" cy="42" r="1"/>
  </g>

  <ellipse cx="430" cy="120" rx="260" ry="105" fill="url(#night-glow)" filter="url(#night-soft-glow)"/>

  <g id="monitor">
    <rect x="392" y="36" width="315" height="142" rx="10" fill="#30363d"/>
    <rect x="401" y="45" width="297" height="124" rx="6" fill="#071019"/>
    <circle cx="415" cy="57" r="3" fill="#ff7b72"/>
    <circle cx="426" cy="57" r="3" fill="#d29922"/>
    <circle cx="437" cy="57" r="3" fill="#3fb950"/>
    <text x="417" y="82" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">$ night-shift</text>
    <text x="417" y="107" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" opacity="0">
      vibing...
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.04;.28;.33;1" dur="6s" repeatCount="indefinite"/>
    </text>
    <text x="417" y="107" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" opacity="0">
      vibe coded
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.32;.36;.61;.65;1" dur="6s" repeatCount="indefinite"/>
    </text>
    <text x="417" y="107" fill="#f2cc60" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" opacity="0">
      shipped
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.64;.68;.94;1" dur="6s" repeatCount="indefinite"/>
    </text>
    <rect x="417" y="125" width="198" height="7" rx="3.5" fill="#21262d"/>
    <rect x="417" y="125" width="0" height="7" rx="3.5" fill="#3fb950">
      <animate attributeName="width" values="0;198;198;0" keyTimes="0;.62;.9;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="417" y="151" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">privacy-first · open source</text>
    <rect x="651" y="143" width="7" height="13" fill="#7ee787">
      <animate attributeName="opacity" values="1;0;1" dur=".8s" repeatCount="indefinite"/>
    </rect>
    <rect x="525" y="178" width="48" height="19" rx="3" fill="#30363d"/>
    <rect x="495" y="195" width="108" height="7" rx="3.5" fill="#484f58"/>
  </g>

  <rect x="55" y="200" width="730" height="16" rx="8" fill="#5f4335"/>
  <rect x="92" y="214" width="16" height="26" fill="#3d2d28"/>
  <rect x="730" y="214" width="16" height="26" fill="#3d2d28"/>

  <g id="koala">
    <ellipse cx="276" cy="181" rx="67" ry="48" fill="#737e8c"/>
    <circle cx="218" cy="91" r="35" fill="#7d8795"/>
    <circle cx="324" cy="91" r="35" fill="#7d8795"/>
    <circle cx="218" cy="91" r="21" fill="#e2a9b4"/>
    <circle cx="324" cy="91" r="21" fill="#e2a9b4"/>
    <ellipse cx="271" cy="113" rx="65" ry="62" fill="#aab4c0"/>
    <ellipse cx="271" cy="135" rx="25" ry="20" fill="#e6edf3"/>
    <ellipse cx="271" cy="126" rx="18" ry="14" fill="#24292f"/>
    <path d="M259 143 Q271 151 283 143" fill="none" stroke="#24292f" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="245" cy="107" rx="6" ry="8" fill="#161b22">
      <animate attributeName="ry" values="8;8;1;8;8" keyTimes="0;.44;.47;.5;1" dur="4.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="297" cy="107" rx="6" ry="8" fill="#161b22">
      <animate attributeName="ry" values="8;8;1;8;8" keyTimes="0;.44;.47;.5;1" dur="4.8s" repeatCount="indefinite"/>
    </ellipse>
    <g transform="translate(320 162)">
      <path d="M0 0 Q31 8 49 25" fill="none" stroke="#aab4c0" stroke-width="17" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="-3 0 0;5 0 0;-3 0 0" dur=".42s" repeatCount="indefinite"/>
      </path>
      <circle cx="49" cy="25" r="9" fill="#737e8c"/>
    </g>
    <g transform="translate(224 165)">
      <path d="M0 0 Q29 4 54 21" fill="none" stroke="#aab4c0" stroke-width="17" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="4 0 0;-4 0 0;4 0 0" dur=".42s" repeatCount="indefinite"/>
      </path>
      <circle cx="54" cy="21" r="9" fill="#737e8c"/>
    </g>
  </g>

  <g id="keyboard">
    <path d="M288 184 H428 L455 202 H269 Z" fill="#30363d"/>
    <g fill="#6e7681">
      <rect x="300" y="188" width="17" height="5" rx="2"/>
      <rect x="321" y="188" width="17" height="5" rx="2"/>
      <rect x="342" y="188" width="17" height="5" rx="2"/>
      <rect x="363" y="188" width="17" height="5" rx="2"/>
      <rect x="384" y="188" width="17" height="5" rx="2"/>
      <rect x="405" y="188" width="17" height="5" rx="2"/>
      <rect x="315" y="196" width="92" height="4" rx="2"/>
    </g>
  </g>

  <g id="coffee">
    <rect x="680" y="177" width="38" height="25" rx="5" fill="#d29922"/>
    <path d="M718 182 Q736 181 732 193 Q729 200 718 197" fill="none" stroke="#d29922" stroke-width="6"/>
    <path d="M692 172 C684 162 702 158 694 147" fill="none" stroke="#c9d1d9" stroke-width="3" stroke-linecap="round" opacity=".65">
      <animateTransform attributeName="transform" type="translate" values="0 4;4 -4;0 -11" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.65;0" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M706 172 C698 162 716 158 708 147" fill="none" stroke="#c9d1d9" stroke-width="3" stroke-linecap="round" opacity=".45">
      <animateTransform attributeName="transform" type="translate" values="0 6;-4 -3;1 -12" dur="2.7s" begin=".7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.55;0" dur="2.7s" begin=".7s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
