<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Koala Night Shift</title>
  <desc id="desc">A polished animated koala sits behind a desk and types while a terminal cycles from vibing to shipped.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c111b"/>
      <stop offset="1" stop-color="#1c2942"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a5a44"/>
      <stop offset="1" stop-color="#603c31"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131c"/>
      <stop offset="1" stop-color="#0c1d29"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#58a6ff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#020409" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="960" height="300" rx="22" fill="url(#bg)"/>
  <ellipse cx="610" cy="135" rx="330" ry="155" fill="url(#glow)"/>
  <circle cx="874" cy="54" r="27" fill="#dce7ff" opacity=".88"/>
  <circle cx="886" cy="44" r="27" fill="#17233a"/>
  <g fill="#88b8f4" opacity=".85">
    <circle cx="67" cy="48" r="1.5"/>
    <circle cx="132" cy="83" r="1"/>
    <circle cx="394" cy="35" r="1.3"/>
    <circle cx="816" cy="94" r="1.2"/>
    <circle cx="915" cy="106" r="1"/>
  </g>

  <!-- Chair: entirely behind the koala and desk. -->
  <g filter="url(#shadow)">
    <path d="M123 215 C120 142 143 82 215 66 C283 52 337 93 349 166 L342 233 Z" fill="#28364f" stroke="#41516d" stroke-width="6"/>
    <path d="M142 210 C143 147 160 101 218 87 C271 75 313 108 323 166 L317 224 Z" fill="#34435e"/>
    <path d="M227 229 V274 M197 277 H257" fill="none" stroke="#202b40" stroke-width="12" stroke-linecap="round"/>
    <path d="M227 274 L177 294 M227 274 L277 294" fill="none" stroke="#202b40" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- Monitor and stand sit behind the tabletop. -->
  <g id="monitor" filter="url(#shadow)">
    <rect x="451" y="35" width="400" height="186" rx="15" fill="#303b4d" stroke="#526078" stroke-width="3"/>
    <rect x="464" y="48" width="374" height="160" rx="9" fill="url(#screen)"/>
    <circle cx="480" cy="64" r="4" fill="#ff7b72"/>
    <circle cx="494" cy="64" r="4" fill="#f2cc60"/>
    <circle cx="508" cy="64" r="4" fill="#56d364"/>
    <text x="482" y="92" fill="#768390" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">$ koalastuff/night-shift</text>

    <text x="482" y="128" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700">
      vibing...
      <animate attributeName="opacity" values="1;1;0;0;0" keyTimes="0;.28;.34;.99;1" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="482" y="128" fill="#79c0ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700" opacity="0">
      vibe coded
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.33;.39;.61;.67;1" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="482" y="128" fill="#f2cc60" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700" opacity="0">
      shipped
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.66;.72;.94;1" dur="7s" repeatCount="indefinite"/>
    </text>

    <rect x="482" y="151" width="304" height="9" rx="4.5" fill="#1f2b38"/>
    <rect x="482" y="151" width="0" height="9" rx="4.5" fill="#56d364">
      <animate attributeName="width" values="0;304;304;0" keyTimes="0;.64;.9;1" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#56d364;#56d364;#79c0ff;#f2cc60" keyTimes="0;.36;.68;1" dur="7s" repeatCount="indefinite"/>
    </rect>
    <text x="482" y="186" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">free · privacy-first · open source</text>
    <rect x="787" y="174" width="7" height="14" rx="1" fill="#7ee787">
      <animate attributeName="opacity" values="1;0;1" dur=".85s" repeatCount="indefinite"/>
    </rect>
    <path d="M629 221 V237 M581 237 H677" fill="none" stroke="#3c485c" stroke-width="13" stroke-linecap="round"/>
  </g>

  <!-- Koala torso remains behind the desk. -->
  <g id="koala">
    <path d="M184 180 C181 143 199 126 233 123 C281 118 322 143 329 198 L327 241 H180 Z" fill="#778593" stroke="#354151" stroke-width="6"/>

    <g>
      <circle cx="176" cy="94" r="43" fill="#7e8b98" stroke="#354151" stroke-width="6"/>
      <circle cx="311" cy="94" r="43" fill="#7e8b98" stroke="#354151" stroke-width="6"/>
      <circle cx="176" cy="94" r="25" fill="#d69aa7"/>
      <circle cx="311" cy="94" r="25" fill="#d69aa7"/>
      <path d="M168 98 C168 43 202 20 244 20 C291 20 320 52 320 103 C320 158 289 183 244 183 C197 183 168 152 168 98 Z" fill="#aeb9c4" stroke="#354151" stroke-width="7"/>
      <ellipse cx="216" cy="102" rx="7" ry="10" fill="#202833">
        <animate attributeName="ry" values="10;10;1.5;10;10" keyTimes="0;.43;.46;.49;1" dur="5.2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="273" cy="102" rx="7" ry="10" fill="#202833">
        <animate attributeName="ry" values="10;10;1.5;10;10" keyTimes="0;.43;.46;.49;1" dur="5.2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="244" cy="127" rx="30" ry="24" fill="#eef2f6"/>
      <path d="M223 119 C223 104 232 96 244 96 C256 96 265 104 265 119 C265 132 255 139 244 139 C233 139 223 132 223 119 Z" fill="#232c37"/>
      <path d="M231 145 Q244 154 257 145" fill="none" stroke="#232c37" stroke-width="5" stroke-linecap="round"/>
      <ellipse cx="195" cy="74" rx="8" ry="15" fill="#cdd5dc" opacity=".45" transform="rotate(28 195 74)"/>
    </g>

    <!-- Arms stop at the desk edge; paws are drawn later on top of the keyboard. -->
    <path d="M199 173 C225 184 260 198 298 211" fill="none" stroke="#aeb9c4" stroke-width="24" stroke-linecap="round"/>
    <path d="M293 169 C317 181 341 194 365 210" fill="none" stroke="#aeb9c4" stroke-width="24" stroke-linecap="round"/>
  </g>

  <!-- Desk masks the lower body and makes the seating position unambiguous. -->
  <g id="desk">
    <rect x="48" y="228" width="864" height="24" rx="10" fill="url(#desk)" stroke="#4b3029" stroke-width="4"/>
    <path d="M78 252 H882 L867 300 H93 Z" fill="#53352c"/>
    <path d="M112 252 V300 M848 252 V300" stroke="#3f2924" stroke-width="18"/>
    <path d="M78 264 H882" stroke="#6d4638" stroke-width="3" opacity=".65"/>
  </g>

  <g id="keyboard" filter="url(#shadow)">
    <path d="M278 198 H430 L457 228 H263 Z" fill="#303b4d" stroke="#526078" stroke-width="3"/>
    <g fill="#8b98a9">
      <rect x="291" y="205" width="20" height="7" rx="2"/>
      <rect x="316" y="205" width="20" height="7" rx="2"/>
      <rect x="341" y="205" width="20" height="7" rx="2"/>
      <rect x="366" y="205" width="20" height="7" rx="2"/>
      <rect x="391" y="205" width="20" height="7" rx="2"/>
      <rect x="304" y="216" width="104" height="6" rx="3"/>
    </g>
  </g>

  <g id="paws">
    <ellipse cx="301" cy="207" rx="17" ry="13" fill="#929faa" stroke="#354151" stroke-width="4">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur=".48s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="372" cy="209" rx="17" ry="13" fill="#929faa" stroke="#354151" stroke-width="4">
      <animateTransform attributeName="transform" type="translate" values="0 -3;0 0;0 -3" dur=".48s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g id="coffee" filter="url(#shadow)">
    <rect x="807" y="194" width="46" height="34" rx="8" fill="#e2a31b"/>
    <path d="M853 201 Q875 198 873 214 Q870 226 853 223" fill="none" stroke="#e2a31b" stroke-width="8"/>
    <path d="M820 186 C810 174 831 168 821 154" fill="none" stroke="#dbe7f5" stroke-width="4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0 7;5 -4;0 -15" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.55;0" dur="2.6s" repeatCount="indefinite"/>
    </path>
    <path d="M838 186 C828 174 849 168 839 154" fill="none" stroke="#dbe7f5" stroke-width="4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0 8;-4 -3;1 -16" dur="2.9s" begin=".6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.42;0" dur="2.9s" begin=".6s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
